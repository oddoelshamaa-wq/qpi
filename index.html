<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshamaa | Web Development</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #111114;
            --border: #27272a;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --neon-blue: #3b82f6;
            --neon-cyan: #06b6d4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة لزيادة الجمالية */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(6, 182, 212, 0.05) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .loader-container {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تأثير إطار الشعار المتوهج */
        .logo-frame {
            position: relative;
            padding: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), 0 0 60px rgba(6, 182, 212, 0.2);
            animation: spinBorder 4s linear infinite;
        }

        @keyframes spinBorder {
            0% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
            50% { box-shadow: 0 0 50px rgba(6, 182, 212, 0.8); }
            100% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
        }

        .logo-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-dark);
            display: block;
        }

        .brand-text {
            text-align: center;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .brand-sub {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* شريط التحميل */
        .loading-bar-container {
            width: 300px;
            height: 6px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid var(--border);
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .loading-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* زر الدخول للوحة التحكم */
        .dashboard-btn {
            display: none; /* يظهر بعد انتهاء التحميل */
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Cairo';
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .dashboard-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        @media (max-width: 600px) {
            .logo-img { width: 130px; height: 130px; }
            .brand-name { font-size: 2rem; }
            .loading-bar-container { width: 250px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="loader-container">
        <div class="logo-frame">
            <!-- رابط شعار Elshamaa -->
            <img src="https://z-cdn-media.chatglm.cn/files/562e7e92-9e70-4ae4-a3b8-8760bdf04905.jpg?auth_key=1881622081-d40dc97a65334a0f8c4b0a3dfadd858e-0-0057c5cf569989e61de1ea480db58ff5" alt="Elshamaa Logo" class="logo-img">
        </div>

        <div class="brand-text">
            <div class="brand-name">Elshamaa</div>
            <div class="brand-sub">Web Development</div>
        </div>

        <div class="loading-bar-container">
            <div class="loading-bar" id="loadingBar"></div>
        </div>
        
        <div class="loading-text" id="loadingText">Initializing System... 0%</div>

<button class="dashboard-btn" id="dashBtn" onclick="window.location.href='dashboard.html'">🖥️ Go to Dashboard</button>    </div>

       <script>
        let width = 0;
        const bar = document.getElementById('loadingBar');
        const text = document.getElementById('loadingText');
        const btn = document.getElementById('dashBtn');
        
        // تأثير التحميل التدريجي
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                text.innerText = "Welcome to Elshamaa System!";
                text.style.color = "#06b6d4";
                
                // تحويل تلقائي للوحة التحكم بعد ثانيتين من اكتمال التحميل
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000); // الـ 2000 دي تعني ثانيتين، يمكنك زيادتها أو تقليلها
            } else {
                let increment = Math.floor(Math.random() * 5) + 1;
                width = Math.min(width + increment, 100);
                bar.style.width = width + '%';
                text.innerText = `Loading Assets... ${width}%`;
            }
        }, 80);
    </script>
</body>
</html>
</body>
</html>
